.67, 6.67 0, 20 0" stroke="#c92a2a" stroke-width="2.5" fill="none" stroke-dasharray="8 10"></path></g><g transform="translate(15 498) rotate(0 345 32.5)"><text x="0" y="10.740234375" font-family="Helvetica, sans-serif, Segoe UI Emoji" font-size="12px" fill="#c92a2a" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Critical: sendNotify() iterates ALL clients sequentially. Each client's sendMutex is locked independently.</text><text x="0" y="25.740234375" font-family="Helvetica, sans-serif, Segoe UI Emoji" font-size="12px" fill="#c92a2a" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">If one client's txRing is full, that client is skipped (returns first error, continues to next).</text><text x="0" y="40.740234375" font-family="Helvetica, sans-serif, Segoe UI Emoji" font-size="12px" fill="#c92a2a" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">The sendMutex serializes notify writes against response writes from the receiver thread — both write to the</text><text x="0" y="55.740234375" font-family="Helvetica, sans-serif, Segoe UI Emoji" font-size="12px" fill="#c92a2a" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">same txRing, which is SPSC (single-producer). The mutex makes the server side appear as a single producer.</text></g></svg>