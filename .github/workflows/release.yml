# release.yml — Build, test, package, and publish Aether SDK on tag push.
#
# Triggers on tags matching v* (e.g., v1.1.0).
# Produces: aether-sdk-{version}-linux-x86_64.tar.gz attached to a GitHub Release.

name: Release SDK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential python3 python3-pip
          pip3 install pytest

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build (Release)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DAETHER_BUILD_EXAMPLES=ON
          cmake --build build -j$(nproc)

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure

      - name: Run Python tests
        run: python3 -m pytest tools/ipcgen/test/ -v -p no:randomly

      - name: Package SDK
        run: python3 build.py --package
        env:
          AETHER_SDK_VERSION: ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: aether-sdk-*.tar.gz
          generate_release_notes: true
