name: Benchmarks

on:
  push:
    branches: [main]

permissions:
  contents: write
  deployments: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DAETHER_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run benchmarks
        run: ./build/bench/aether_benchmarks --benchmark_format=json --benchmark_out=benchmark_result.json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'googlecpp'
          output-file-path: benchmark_result.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
