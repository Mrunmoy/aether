name: Build

on:
  push:
    branches: [main, fix/ipc-robustness-hardening]
  pull_request:
    branches: [main, fix/ipc-robustness-hardening]

jobs:
  linux-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} -DAETHER_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Unit & integration tests
        run: ctest --test-dir build --output-on-failure

      - name: Codegen tests
        run: |
          build/examples/echo/codegen_server_tests
          build/examples/echo/codegen_client_tests

      - name: ipcgen pytest suite
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install 'pytest>=7'
          export PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
          python3 -m pytest tools/ipcgen/test/ -v

  macos-build:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DAETHER_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build -j3

      - name: Unit & integration tests
        run: ctest --test-dir build --output-on-failure --timeout 30

      - name: Codegen tests
        timeout-minutes: 2
        run: |
          build/examples/echo/codegen_server_tests
          build/examples/echo/codegen_client_tests

      - name: ipcgen pytest suite
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install 'pytest>=7'
          export PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
          python3 -m pytest tools/ipcgen/test/ -v

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure
        shell: bash
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Debug -DAETHER_BUILD_EXAMPLES=ON

      - name: Build
        shell: bash
        run: cmake --build build --config Debug --parallel

      - name: Unit & integration tests
        shell: bash
        run: ctest --test-dir build --build-config Debug --output-on-failure

      - name: ipcgen pytest suite
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'pytest>=7'
          python -m pytest -p no:randomly tools/ipcgen/test/ -v
