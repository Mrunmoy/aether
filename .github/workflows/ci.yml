name: Build

on:
  push:
    branches: [main, fix/ipc-robustness-hardening]
  pull_request:
    branches: [main, fix/ipc-robustness-hardening]

jobs:
  # ---------------------------------------------------------------------------
  # Quickstart validation — mechanically enforces the documented newcomer path
  # This job validates that a clean-machine user can follow README.md and succeed.
  # ---------------------------------------------------------------------------
  quickstart-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: quickstart-validation

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Step 1: Build using the README-recommended command (with examples)
      - name: Build (README path)
        run: python3 build.py -e

      # Step 2: Run the echo example server and client (end-to-end validation)
      - name: Run echo example (server + client)
        timeout-minutes: 1
        run: |
          echo "=== Starting echo_server ==="
          # Use timeout to ensure server terminates even if signal handling fails
          timeout 30 ./build/examples/echo/echo_server &
          SERVER_PID=$!

          # Ensure server is stopped even if client fails
          cleanup() {
            echo "=== Stopping echo_server ==="
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true
          }
          trap cleanup EXIT

          sleep 0.5

          echo "=== Running echo_client ==="
          ./build/examples/echo/echo_client
          CLIENT_EXIT=$?

          if [ $CLIENT_EXIT -ne 0 ]; then
            echo "ERROR: echo_client failed with exit code $CLIENT_EXIT"
            exit 1
          fi
          echo "SUCCESS: Echo example completed successfully"

      # Step 3: Validate ipcgen code generation workflow
      - name: Validate ipcgen codegen workflow
        run: |
          echo "=== Testing ipcgen with DeviceMonitor.idl ==="
          python3 -m tools.ipcgen examples/echo/DeviceMonitor.idl --outdir /tmp/quickstart_gen/

          echo "=== Checking generated files ==="
          test -f /tmp/quickstart_gen/DeviceMonitorTypes.h || (echo "Missing DeviceMonitorTypes.h" && exit 1)
          test -f /tmp/quickstart_gen/server/DeviceMonitor.h || (echo "Missing server/DeviceMonitor.h" && exit 1)
          test -f /tmp/quickstart_gen/server/DeviceMonitor.cpp || (echo "Missing server/DeviceMonitor.cpp" && exit 1)
          test -f /tmp/quickstart_gen/client/DeviceMonitor.h || (echo "Missing client/DeviceMonitor.h" && exit 1)
          test -f /tmp/quickstart_gen/client/DeviceMonitor.cpp || (echo "Missing client/DeviceMonitor.cpp" && exit 1)

          echo "SUCCESS: ipcgen code generation works correctly"

      # Step 4: Install Python test dependencies required by build.py -t
      - name: Install Python test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "pytest>=7"

      # Step 5: Validate the full test suite command from README
      - name: Run full test suite (README -t flag)
        run: |
          export PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
          python3 build.py -t

  # ---------------------------------------------------------------------------
  # Documentation validation — ensures README commands work on clean machines
  # ---------------------------------------------------------------------------
  docs-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: docs-validation

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Step 1: Validate Quick Start commands from README.md
      - name: Validate Quick Start build command
        run: |
          echo "=== Testing: python3 build.py -e ==="
          python3 build.py -e
          echo "SUCCESS: Build completed"

      # Step 2: Validate codegen command from README.md
      - name: Validate codegen command works
        run: |
          echo "=== Testing: python3 -m tools.ipcgen ==="
          python3 -m tools.ipcgen examples/echo/DeviceMonitor.idl --outdir /tmp/validate_codegen/
          
          # Verify expected files were generated
          test -f /tmp/validate_codegen/DeviceMonitorTypes.h || (echo "FAIL: DeviceMonitorTypes.h not generated" && exit 1)
          test -f /tmp/validate_codegen/server/DeviceMonitor.h || (echo "FAIL: server/DeviceMonitor.h not generated" && exit 1)
          test -f /tmp/validate_codegen/server/DeviceMonitor.cpp || (echo "FAIL: server/DeviceMonitor.cpp not generated" && exit 1)
          test -f /tmp/validate_codegen/client/DeviceMonitor.h || (echo "FAIL: client/DeviceMonitor.h not generated" && exit 1)
          test -f /tmp/validate_codegen/client/DeviceMonitor.cpp || (echo "FAIL: client/DeviceMonitor.cpp not generated" && exit 1)
          echo "SUCCESS: Codegen produced expected files"

      # Step 3: Validate example READMEs have required sections
      - name: Validate example README structure
        run: |
          echo "=== Checking example READMEs for required sections ==="
          
          # Check core examples that should have full READMEs
          for readme in examples/echo/README.md examples/c-echo/README.md examples/sdk-usage/README.md; do
            echo "Checking $readme..."
            
            # Check file exists
            if [ ! -f "$readme" ]; then
              echo "FAIL: $readme does not exist"
              exit 1
            fi
            
            # Check for required sections (flexible matching for variations like "## Step X — Build")
            if ! grep -qE "^## (Prerequisites|.*Prerequisites)" "$readme"; then
              echo "FAIL: $readme missing section: Prerequisites"
              exit 1
            fi
            
            if ! grep -qE "^## (Build|.*Build)" "$readme"; then
              echo "FAIL: $readme missing section: Build"
              exit 1
            fi
            
            if ! grep -qE "^## (Run|.*Run)" "$readme"; then
              echo "FAIL: $readme missing section: Run"
              exit 1
            fi
            
            if ! grep -qE "^## (Expected Output|.*Expected Output)" "$readme"; then
              echo "FAIL: $readme missing section: Expected Output"
              exit 1
            fi
            
            echo "PASS: $readme has all required sections"
          done
          
          echo "SUCCESS: All example READMEs have required structure"

      # Step 4: Run echo example and verify expected output patterns
      - name: Run echo example and verify output
        timeout-minutes: 1
        run: |
          echo "=== Testing echo example produces expected output patterns ==="
          
          # Start echo_server in background
          timeout 30 ./build/examples/echo/echo_server &
          SERVER_PID=$!
          
          # Cleanup function
          cleanup() {
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true
          }
          trap cleanup EXIT
          
          sleep 0.5
          
          # Run echo_client and capture output
          OUTPUT=$(./build/examples/echo/echo_client 2>&1)
          echo "$OUTPUT"
          
          # Verify expected output patterns
          if ! echo "$OUTPUT" | grep -q "Connected to echo service"; then
            echo "FAIL: Missing 'Connected to echo service' in output"
            exit 1
          fi
          
          if ! echo "$OUTPUT" | grep -q 'sent: "Hello"'; then
            echo "FAIL: Missing expected echo output pattern"
            exit 1
          fi
          
          if ! echo "$OUTPUT" | grep -q "Disconnected"; then
            echo "FAIL: Missing 'Disconnected' in output"
            exit 1
          fi
          
          echo "SUCCESS: Echo example output matches expected patterns"

      # Step 5: Run c-echo example and verify expected output patterns
      - name: Run c-echo example and verify output
        timeout-minutes: 1
        run: |
          echo "=== Testing c-echo example produces expected output patterns ==="
          
          # Start c_echo_server in background
          timeout 30 ./build/examples/c-echo/c_echo_server &
          SERVER_PID=$!
          
          # Cleanup function
          cleanup() {
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true
          }
          trap cleanup EXIT
          
          sleep 0.5
          
          # Run c_echo_client and capture output
          OUTPUT=$(./build/examples/c-echo/c_echo_client 2>&1)
          echo "$OUTPUT"
          
          # Verify expected output patterns
          if ! echo "$OUTPUT" | grep -q "connected to 'c_echo'"; then
            echo "FAIL: Missing 'connected to c_echo' in output"
            exit 1
          fi
          
          if ! echo "$OUTPUT" | grep -q "sent 'Hello'"; then
            echo "FAIL: Missing expected echo output pattern"
            exit 1
          fi
          
          echo "SUCCESS: C-echo example output matches expected patterns"

  linux-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} -DAETHER_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Unit & integration tests
        run: ctest --test-dir build --output-on-failure

      - name: Codegen tests
        run: |
          build/examples/echo/codegen_server_tests
          build/examples/echo/codegen_client_tests

      - name: ipcgen pytest suite
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install 'pytest>=7'
          export PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
          python3 -m pytest tools/ipcgen/test/ -v

  linux-sanitizers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer_name: asan-ubsan
            sanitizers: address,undefined
            env: ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1
          - sanitizer_name: tsan
            sanitizers: thread
            env: TSAN_OPTIONS=halt_on_error=1:history_size=7

    name: linux-sanitizers (${{ matrix.sanitizer_name }})

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++
          -DAETHER_BUILD_EXAMPLES=ON
          -DAETHER_SANITIZERS=${{ matrix.sanitizers }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Sanitized C++ tests
        run: ${{ matrix.env }} build/test/ipc_tests --gtest_brief=1

      - name: Sanitized codegen tests
        run: |
          ${{ matrix.env }} build/examples/echo/codegen_server_tests --gtest_brief=1
          ${{ matrix.env }} build/examples/echo/codegen_client_tests --gtest_brief=1

      - name: ipcgen pytest suite
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install 'pytest>=7'
          export PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
          ${{ matrix.env }} python3 -m pytest tools/ipcgen/test/ -v

  macos-build:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DAETHER_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build -j3

      - name: Unit & integration tests
        run: ctest --test-dir build --output-on-failure --timeout 30

      - name: Codegen tests
        timeout-minutes: 2
        run: |
          build/examples/echo/codegen_server_tests
          build/examples/echo/codegen_client_tests

      - name: ipcgen pytest suite
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install 'pytest>=7'
          export PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
          python3 -m pytest tools/ipcgen/test/ -v

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure
        shell: bash
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Debug -DAETHER_BUILD_EXAMPLES=ON

      - name: Build
        shell: bash
        run: cmake --build build --config Debug --parallel

      - name: Unit & integration tests
        shell: bash
        run: ctest --test-dir build --build-config Debug --output-on-failure --timeout 30

      - name: ipcgen pytest suite
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'pytest>=7'
          python -m pytest -p no:randomly tools/ipcgen/test/ -v
